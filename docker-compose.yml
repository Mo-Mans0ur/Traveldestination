services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel_web
    depends_on:
      - mariadb
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: traveldb
      SECRET_KEY: dev-secret-change-me
    ports:
      - "5000:5000"
    volumes:
      - .:/app

  mariadb:
    image: mariadb:10.6
    container_name: travel_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: traveldb
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: travel_phpmyadmin
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: password
    ports:
      - "8080:80"

volumes:
  mariadb_data: